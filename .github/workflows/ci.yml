name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y jq bc

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install jq bc

      - name: Validate shell scripts (syntax check)
        run: |
          errors=0
          while IFS= read -r script; do
            if ! bash -n "$script" 2>/dev/null; then
              echo "::error file=$script::Syntax error in $script"
              errors=$((errors + 1))
            fi
          done < <(find scripts/ -name "*.sh" -type f)
          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors script(s) have syntax errors"
            exit 1
          fi
          echo "All shell scripts pass syntax validation"

      - name: Run test suite
        run: bash tests/run-tests.sh

      - name: Verify platform sync
        run: |
          if [ -f scripts/sync-platforms.sh ]; then
            bash scripts/sync-platforms.sh check
          else
            echo "::warning::sync-platforms.sh not found, skipping sync check"
          fi
